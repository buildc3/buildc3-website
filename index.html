<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/buildc3-logo.png" />
    <link rel="apple-touch-icon" href="/buildc3-logo.png" />

    <!-- Primary meta tags -->
    <title>BuildC3 — Builders & Developers Community</title>
    <meta
      name="description"
      content="BuildC3 is a community of builders and developers. Build in the community, with the community, and for the community — explore projects, services, resources and meet the people behind it."
    />
    <meta
      name="keywords"
      content="BuildC3, builders community, developers community, build in public, software projects, developer collaboration, tech community"
    />
    <meta name="author" content="BuildC3" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#5c79ff" />
    <link rel="canonical" href="https://buildc3.tech/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="BuildC3" />
    <meta property="og:title" content="BuildC3 — Builders & Developers Community" />
    <meta
      property="og:description"
      content="A community of builders and developers. Build in the community, with the community, and for the community."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buildc3.tech/" />
    <meta property="og:image" content="https://buildc3.tech/Screenshot%202026-03-27%20at%2016.41.16.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BuildC3 — Builders & Developers Community" />
    <meta
      name="twitter:description"
      content="A community of builders and developers. Build in the community, with the community, and for the community."
    />
    <meta name="twitter:image" content="https://buildc3.tech/Screenshot%202026-03-27%20at%2016.41.16.png" />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "BuildC3",
        "alternateName": "BuildC3 Community",
        "url": "https://buildc3.tech/",
        "logo": "https://buildc3.tech/buildc3-logo.png",
        "description": "A community of builders and developers. Build in the community, with the community, and for the community.",
        "email": "buildc3.dev@gmail.com"
      }
    </script>

    <!-- Structured data: WebSite (helps Google resolve the brand name) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "BuildC3",
        "url": "https://buildc3.tech/"
      }
    </script>

    <!-- Structured data: Site navigation (signals the main sections to Google for Sitelinks) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "itemListElement": [
          { "@type": "SiteNavigationElement", "position": 1, "name": "Home", "url": "https://buildc3.tech/" },
          { "@type": "SiteNavigationElement", "position": 2, "name": "About", "url": "https://buildc3.tech/about" },
          { "@type": "SiteNavigationElement", "position": 3, "name": "Services", "url": "https://buildc3.tech/services" },
          { "@type": "SiteNavigationElement", "position": 4, "name": "Our Work", "url": "https://buildc3.tech/projects" },
          { "@type": "SiteNavigationElement", "position": 5, "name": "Resources", "url": "https://buildc3.tech/resources" },
          { "@type": "SiteNavigationElement", "position": 6, "name": "Community", "url": "https://buildc3.tech/community" },
          { "@type": "SiteNavigationElement", "position": 7, "name": "Contact", "url": "https://buildc3.tech/contact" },
          { "@type": "SiteNavigationElement", "position": 8, "name": "Join BuildC3", "url": "https://buildc3.tech/join-buildc3" }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
